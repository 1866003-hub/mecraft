<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 1.1.5 (Drag Rotation)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; font-size: 14px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            pointer-events: none;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>
    <div id="info">
        <h3>mecraft v1.1.5</h3>
        <p>操作: W/A/S/D = 移動</p>
        <p>視点: 画面をドラッグ（クリックしながら動かす）して見渡す</p>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12); 

        // カメラの回転順序を「Y軸（横振り）の後にX軸（縦振り）」に固定して、画面が斜めに傾くのを防ぐ
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);

        // --- 16×16の地面作成 ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });
        const heightMap = {};

        const chunkSize = 16;
        for (let x = 0; x < chunkSize; x++) {
            for (let z = 0; z < chunkSize; z++) {
                const cube = new THREE.Mesh(geometry, material);
                const height = Math.floor(Math.sin(x * 0.5) * 2 + Math.cos(z * 0.5) * 2);
                cube.position.set(x, height, z);
                scene.add(cube);
                heightMap[`${x}_${z}`] = height + 0.5;
            }
        }

        // --- ★新機能：ドラッグによる視点移動システム ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            // 前回からのマウスの移動量を計算
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            // マウスの移動をカメラの回転に変換（0.003は感度調整）
            camera.rotation.y -= deltaX * 0.003; // 左右を見渡す
            camera.rotation.x -= deltaY * 0.003; // 上下を見上げる・見下ろす

            // 真上や真後ろを向いて画面がバグるのを防ぐ（上下の限界設定）
            camera.rotation.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, camera.rotation.x));

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        
        // --- キーボード入力の管理（WASD） ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
        });

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            const speed = 0.12;
            
            // ★カメラの「向いている方向」を基準にして進むようにパワーアップ！
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            // Y軸（上下）の移動成分を消して、地面を水平に歩くようにする
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, speed);
            if (keys.s) camera.position.addScaledVector(forward, -speed);
            if (keys.a) camera.position.addScaledVector(right, -speed);
            if (keys.d) camera.position.addScaledVector(right, speed);

            // 地面に足を乗せる処理
            const currentX = Math.round(camera.position.x);
            const currentZ = Math.round(camera.position.z);
            const mapKey = `${currentX}_${currentZ}`;

            if (heightMap[mapKey] !== undefined) {
                const targetY = heightMap[mapKey] + 1.6;
                camera.position.y += (targetY - camera.position.y) * 0.3;
            } else {
                if (camera.position.y < -10) camera.position.set(8, 6, 12);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

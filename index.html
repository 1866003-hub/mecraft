<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 1.1.0 (First Person)</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        /* 画面中央の十字レティクル（照準） */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            color: white; font-family: sans-serif;
            font-size: 20px; user-select: none; pointer-events: none;
        }
        /* クリックして開始する案内画面 */
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: sans-serif; cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="instructions">
        <h1>mecraft v1.1.0</h1>
        <p>画面をクリックしてゲーム開始</p>
        <p>操作: WASD = 移動 / マウス = 視点変更</p>
    </div>
    <div id="crosshair">+</div>

    <script>
        // 1. シーンとカメラの作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // プレイヤーの初期位置（山の少し上に配置）
        camera.position.set(8, 5, 8); 

        // 2. レンダーの作成
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3. 一人称視点コントロールの設定
        const controls = new THREE.PointerLockControls(camera, document.body);
        
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => {
            controls.lock(); // 画面をクリックしたらマウスを固定してゲーム開始
        });
        controls.addEventListener('lock', () => { instructions.style.display = 'none'; });
        controls.addEventListener('unlock', () => { instructions.style.display = 'flex'; });

        // 4. キーボード移動の処理
        const move = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.forward = true;
            if(e.code === 'KeyS') move.backward = true;
            if(e.code === 'KeyA') move.left = true;
            if(e.code === 'KeyD') move.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.forward = false;
            if(e.code === 'KeyS') move.backward = false;
            if(e.code === 'KeyA') move.left = false;
            if(e.code === 'KeyD') move.right = false;
        });

        // 5. ライトの設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);

        // 6. 16×16の凸凹した地面を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

        const chunkSize = 16;
        for (let x = 0; x < chunkSize; x++) {
            for (let z = 0; z < chunkSize; z++) {
                const cube = new THREE.Mesh(geometry, material);
                const height = Math.floor(Math.sin(x * 0.5) * 2 + Math.cos(z * 0.5) * 2);
                cube.position.set(x, height, z);
                scene.add(cube);
            }
        }

        // 7. アニメーションループ（移動の計算）
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000; // 前のフレームからの経過時間

                // 速度の減衰（慣性）
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // 移動方向の決定
                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize();

                // 速度の加算
                if (move.forward || move.backward) velocity.z -= direction.z * 100.0 * delta;
                if (move.left || move.right) velocity.x -= direction.x * 100.0 * delta;

                // カメラの移動
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

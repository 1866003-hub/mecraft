<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 3D Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
    <!-- Three.jsをネット経由で読み込む -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <script>
        // 1. シーン（世界）の作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // マイクラ風の青空の色

        // 2. カメラの作成（視野角, 画面比率, 描画開始距離, 描画終了距離）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; // カメラを少し後ろに引く

        // 3. レンダー（描画装置）の作成
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. ブロック（立方体）の作成
        const geometry = new THREE.BoxGeometry(1, 1, 1); // 縦・横・奥が1の箱
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // 緑色（草ブロックのイメージ）
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube); // 世界にブロックを追加

        // 5. アニメーションループ（画面を更新し続ける）
        function animate() {
            requestAnimationFrame(animate);

            // テストとしてブロックを少しずつ回転させてみる
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);
        }
        animate();

        // 画面サイズが変わったときの調整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

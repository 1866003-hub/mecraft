<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 1.2.0 (Texture, Break/Build & Infinite World)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; font-size: 14px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; font-size: 24px;
            pointer-events: none; user-select: none;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>
    <div id="info">
        <h3>mecraft v1.2.0</h3>
        <p>操作: W/A/S/D = 移動 / ドラッグ = 視点変更</p>
        <p>アクション: クリック = ブロック破壊 / 右クリック = ブロック設置</p>
    </div>
    <div id="crosshair">+</div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        // 霧（フォグ）を追加して、遠くのワールドが自然に消えるようにする（本家の描写距離の再現）
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 10, 8); 
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(20, 40, 20);
        scene.add(directionalLight);

        // --- ★新機能1: プログラムでマイクラ風ドット絵テクスチャを作る ---
        function createCraftTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    if (type === 'grass') {
                        // 上面：ランダムな緑のドット
                        const g = 130 + Math.floor(Math.random() * 50);
                        ctx.fillStyle = `rgb(50, ${g}, 40)`;
                    } else {
                        // 側面・土：ランダムな茶色のドット
                        const r = 90 + Math.floor(Math.random() * 30);
                        ctx.fillStyle = `rgb(${r}, ${r*0.7}, ${r*0.5})`;
                    }
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // ドット絵をハッキリクッキリ見せる設定
            return texture;
        }

        const grassTopTex = createCraftTexture('grass');
        const dirtTex = createCraftTexture('dirt');

        // ブロック用のマテリアル（上が草、横と下が土）
        const blockMaterials = [
            new THREE.MeshLambertMaterial({ map: dirtTex }), // 右
            new THREE.MeshLambertMaterial({ map: dirtTex }), // 左
            new THREE.MeshLambertMaterial({ map: grassTopTex }), // 上
            new THREE.MeshLambertMaterial({ map: dirtTex }), // 下
            new THREE.MeshLambertMaterial({ map: dirtTex }), // 前
            new THREE.MeshLambertMaterial({ map: dirtTex })  // 後
        ];

        const geometry = new THREE.BoxGeometry(1, 1, 1);

        // --- ★新機能2: 無限ワールド管理システム ---
        const worldBlocks = {}; // 配置された全ブロックを記録する辞書
        const chunksLoaded = {}; // 生成済みのチャンクを記録する辞書
        const chunkSize = 16;

        // 指定した座標にブロックを生成する関数
        function createBlock(x, y, z) {
            const key = `${x}_${y}_${z}`;
            if (worldBlocks[key]) return;

            const cube = new THREE.Mesh(geometry, blockMaterials);
            cube.position.set(x, y, z);
            scene.add(cube);
            worldBlocks[key] = cube;
        }

        // チャンク単位で世界を自動生成する関数（簡易ノイズを使用）
        function loadChunk(chunkX, chunkZ) {
            const chunkKey = `${chunkX}_${chunkZ}`;
            if (chunksLoaded[chunkKey]) return;
            chunksLoaded[chunkKey] = true;

            const startX = chunkX * chunkSize;
            const startZ = chunkZ * chunkSize;

            for (let x = startX; x < startX + chunkSize; x++) {
                for (let z = startZ; z < startZ + chunkSize; z++) {
                    // かなりなだらかな山を作るために係数を調整
                    const height = Math.floor(Math.sin(x * 0.1) * 3 + Math.cos(z * 0.1) * 3);
                    
                    // 表面に草ブロック
                    createBlock(x, height, z);
                    // その下に土ブロックを2マス分埋める（本家再現）
                    createBlock(x, height - 1, z);
                    createBlock(x, height - 2, z);
                }
            }
        }

        // プレイヤーの周りのチャンクを監視・読み込む
        function updateChunks() {
            const pChunkX = Math.floor(camera.position.x / chunkSize);
            const pChunkZ = Math.floor(camera.position.z / chunkSize);
            
            // プレイヤーの周囲3×3のチャンクを常に生成する（これでどこまで行っても地面がある！）
            const r = 2;
            for (let x = -r; x <= r; x++) {
                for (let z = -r; z <= r; z++) {
                    loadChunk(pChunkX + x, pChunkZ + z);
                }
            }
        }

        // --- ★新機能3: ブロックの「破壊」と「設置」 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // 画面中央（クロスヘア）を狙う

        function handleInteraction(isRightClick) {
            // 画面中央から光線を飛ばして、正面にあるブロックを探す
            raycaster.setFromCamera(mouse, camera);
            // 視線の届く距離（マイクラのリーチ＝5マス）
            raycaster.far = 5;
            
            // 存在する全ブロックを対象に判定
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const hit = intersects[0];
                const targetBlock = hit.object;

                if (!isRightClick) {
                    // 左クリック：破壊
                    scene.remove(targetBlock);
                    // 記録から消去
                    for (let key in worldBlocks) {
                        if (worldBlocks[key] === targetBlock) {
                            delete worldBlocks[key];
                            break;
                        }
                    }
                } else {
                    // 右クリック：設置（当たった面の法線ベクトルを使って、隣の座標を計算）
                    const normal = hit.face.normal;
                    const newX = Math.round(targetBlock.position.x + normal.x);
                    const newY = Math.round(targetBlock.position.y + normal.y);
                    const newZ = Math.round(targetBlock.position.z + normal.z);
                    
                    createBlock(newX, newY, newZ);
                }
            }
        }

        // クリックイベントの登録
        window.addEventListener('pointerdown', (e) => {
            if (isDraggingAction) return; // 視点移動のためのドラッグなら無視
            if (e.button === 0) handleInteraction(false); // 左クリック破壊
            if (e.button === 2) handleInteraction(true);  // 右クリック設置
        });
        // 右クリックメニューがブラウザで開くのを禁止する
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- 視点移動システム (ドラッグ検出の改良) ---
        let isDragging = false;
        let isDraggingAction = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            isDraggingAction = false;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) {
                isDraggingAction = true; // 一定以上動いたら「視点移動」とみなしてクリック判定を無効化
            }

            camera.rotation.y -= deltaX * 0.003;
            camera.rotation.x -= deltaY * 0.003;
            camera.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, camera.rotation.x));
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // --- キーボード入力 ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if (k in keys) keys[k] = true; });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (k in keys) keys[k] = false; });

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. 周辺チャンクの更新（無限ワールド化）
            updateChunks();

            // 2. 移動処理
            const speed = 0.15;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, speed);
            if (keys.s) camera.position.addScaledVector(forward, -speed);
            if (keys.a) camera.position.addScaledVector(right, -speed);
            if (keys.d) camera.position.addScaledVector(right, speed);

            // 3. 地面に足を乗せる処理（簡易衝突判定）
            const currentX = Math.round(camera.position.x);
            const currentZ = Math.round(camera.position.z);
            
            // プレイヤーの足元の座標にブロックがあるか、上から順に探す
            let highestY = -999;
            for (let y = 10; y > -10; y--) {
                if (worldBlocks[`${currentX}_${y}_${currentZ}`]) {
                    highestY = y + 0.5;
                    break;
                }
            }

            if (highestY !== -999) {
                const targetY = highestY + 1.6;
                camera.position.y += (targetY - camera.position.y) * 0.3;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

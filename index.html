<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - Chunk Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <script>
        // 1. シーン（世界）の作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        // 2. カメラの作成（少し高い位置から見下ろす）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 12, 20); // 少し高め・遠目に配置
        camera.lookAt(8, 0, 8);         // 地面の真ん中を向く

        // 3. レンダーの作成
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. 16×16の平らな地面（1つのチャンクの土台）を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x55aa55 });

        const chunkSize = 16;
        for (let x = 0; x < chunkSize; x++) {
            for (let z = 0; z < chunkSize; z++) {
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, 0, z); // XとZの位置をずらしながら配置
                scene.add(cube);
            }
        }

        // 5. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // 画面サイズ変更への対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 1.1.2 (Free Camera)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; font-size: 16px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>
    <div id="info">
        <h3>mecraft v1.1.2</h3>
        <p>操作: 矢印キー (↑↓←→) = カメラ移動</p>
    </div>

    <script>
        // 1. シーンとカメラの作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 12, 25); // 地形全体が見下ろせる位置

        // 2. レンダーの作成
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3. ライトの設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);

        // 4. 16×16の凸凹した地面を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

        const chunkSize = 16;
        for (let x = 0; x < chunkSize; x++) {
            for (let z = 0; z < chunkSize; z++) {
                const cube = new THREE.Mesh(geometry, material);
                const height = Math.floor(Math.sin(x * 0.5) * 2 + Math.cos(z * 0.5) * 2);
                cube.position.set(x, height, z);
                scene.add(cube);
            }
        }

        // 5. キーボード操作（矢印キーでカメラ位置を変更）
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

        // 6. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            // 矢印キーが押されている間、カメラを動かす
            if (keys.ArrowUp)    camera.position.z -= 0.5;
            if (keys.ArrowDown)  camera.position.z += 0.5;
            if (keys.ArrowLeft)  camera.position.x -= 0.5;
            if (keys.ArrowRight) camera.position.x += 0.5;

            // 常に地形の中心（8, 0, 8）をロックオンして見つめる
            camera.lookAt(8, 0, 8);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>mecraft - 1.0.2</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <script>
        // 1. シーン（世界）の作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        // 2. カメラの作成（全体が見えやすい位置に調整）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 25); 
        camera.lookAt(8, 0, 8);         

        // 3. レンダーの作成
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ★追加：光（ライト）を入れる ---
        // これがないと、ブロックの影が見えずに真っ平らに見えてしまいます
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // 世界全体の明るさ
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // 太陽の光
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);
        // ----------------------------------

        // 4. 16×16の凸凹した地面（無限ワールドの基礎）を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        // LambertMaterialに変更（光と影の影響を受ける素材）
        const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

        const chunkSize = 16;
        for (let x = 0; x < chunkSize; x++) {
            for (let z = 0; z < chunkSize; z++) {
                const cube = new THREE.Mesh(geometry, material);
                
                // --- ★変更：数式（サイン波）を使って、XとZの位置に応じた「高さ(Y)」を計算する ---
                // これが無限地形生成（ノイズ関数）の1番シンプルな基本形です！
                const height = Math.floor(Math.sin(x * 0.5) * 2 + Math.cos(z * 0.5) * 2);
                
                cube.position.set(x, height, z); // 計算した高さ（Y）にブロックを置く
                scene.add(cube);
            }
        }

        // 5. アニメーションループ（テスト用にカメラを少しだけ回してみる）
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            // カメラを世界の中心の周りでゆっくり回す（立体感を確認するため）
            angle += 0.005;
            camera.position.x = 8 + Math.sin(angle) * 20;
            camera.position.z = 8 + Math.cos(angle) * 20;
            camera.lookAt(8, 0, 8);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
